<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Certificates | Mayur H R Portfolio</title>
    <link rel="icon" type="logo" href="assest/logo/logo.jpg">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #certificates-page-container {
            display: block !important;
        }

        .back-btn-container {
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--orange-yellow-crayola);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.25s ease, transform 0.25s ease;
        }

        .back-btn:hover {
            color: var(--white-1);
            transform: translateX(-4px);
        }

        #certificateContainer {
            display: grid !important;
        }

        #pagination {
            display: flex !important;
        }

        .subpage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .subpage-title-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .cert-count-badge {
            display: flex;
            align-items: center;
            gap: 10px;

            padding: 10px 18px;

            border-radius: 50px;

            background: linear-gradient(135deg,
                    rgba(37, 99, 235, .18),
                    rgba(59, 130, 246, .08));

            border: 1px solid rgba(59, 130, 246, .25);

            backdrop-filter: blur(12px);

            box-shadow:
                0 10px 25px rgba(59, 130, 246, .12),
                inset 0 1px 0 rgba(255, 255, 255, .06);

            transition: .3s ease;
        }

        .cert-count-badge:hover {
            transform: translateY(-3px);

            border-color: #60a5fa;

            box-shadow:
                0 15px 35px rgba(59, 130, 246, .22);
        }

        .cert-count-badge i {
            color: #60a5fa;
            font-size: 18px;
        }

        .cert-text {
            color: #d5d5d5;
            font-weight: 600;
            font-size: .95rem;
        }

        .cert-number {
            color: #60a5fa;
            font-weight: 800;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <main>
        <!--  #SIDEBAR-->
        <aside class="sidebar" data-sidebar>
            <div class="sidebar-info">
                <div class="profile-banner">
                    <div class="banner-image">
                        <img src="https://drive.google.com/thumbnail?id=1b-KU0haQ1z6gIuQqRtKE0ARiI6Z4lMlt&sz=w2000"
                            alt="Mayur H R">
                    </div>
                    <div class="banner-content">
                        <h1 class="name">Mayur H R</h1><br>
                        <p class="tagline">"Passionate about Learning & Growth"</p><br>
                        <a href="index.html" class="resume-link">
                            ← Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <div class="main-content">
            <article class="active" id="certificates-page-container">
                <div class="back-btn-container">
                    <a href="index.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Back to Portfolio
                    </a>
                </div>

                <header class="subpage-header">
                    <div class="subpage-title-wrap">

                        <h2 class="h2 article-title">All Certificates</h2>

                        <div class="cert-count-badge">
                            <i class="fas fa-award"></i>
                            <span class="cert-text">Certificates</span>
                            <span id="certCount" class="cert-number">0</span>
                        </div>

                    </div>
                </header>

                <!-- Combined Filters (Search, Year, Category) -->
                <div id="filters">
                    <input type="text" id="searchInput" placeholder="Search certificates by title or issuer..." />

                    <select id="yearFilter">
                        <option value="">All Years</option>
                    </select>

                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                    </select>

                    <button id="clearFilters">
                        Clear Filters
                    </button>
                </div>

                <!-- Certificates Grid -->
                <div id="certificateContainer" class="certificate-grid">
                    <!-- Loaded dynamically via certificates.js -->
                </div>

                <!-- Pagination -->
                <div id="pagination" class="pagination">
                    <!-- Loaded dynamically via certificates.js -->
                </div>

                <!-- Fullscreen Image Viewer Modal -->
                <div id="modal" class="modal hidden" aria-hidden="true">
                    <div class="modal-header">
                        <button id="closeModal" aria-label="Close">✕</button>
                    </div>
                    <div class="modal-content">
                        <img id="imageViewer" src="" alt="Certificate" draggable="false">
                    </div>
                </div>

            </article>
        </div>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="certificate-shared.js"></script>
    <script src="certificates.js"></script>
</body>

</html>
